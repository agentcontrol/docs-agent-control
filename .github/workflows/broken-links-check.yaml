name: Check for broken links
on:
  workflow_dispatch:
  pull_request:
    branches:
      - main

jobs:
  broken-link-check:
    name: Check for broken links
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 23
      - run: npm install -g mint
      - run: mint broken-links
